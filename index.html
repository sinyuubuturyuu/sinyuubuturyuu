<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>シンユウ物流アプリランチャー</title>
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="よく使うアプリをすばやく起動するランチャー">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="シンユウ物流">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./sinyuubuturyuu-icon.png" type="image/png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./launcher.css">
</head>
<body>
  <main class="launcher">
    <section class="launcher-card" aria-label="アプリ選択">
      <img class="launcher-logo" src="./sinyuubuturyuu-icon.png" alt="シンユウ物流アプリアイコン">
      <h1>シンユウ物流アプリ</h1>
      <div class="button-group">
        <button id="app1Button" class="launcher-button primary" type="button"></button>
        <button id="app2Button" class="launcher-button primary" type="button"></button>
        <button id="settingsButton" class="launcher-button secondary" type="button">設定</button>
      </div>
    </section>
  </main>

  <dialog id="settingsDialog" class="settings-dialog" aria-label="設定">
    <form id="settingsForm" class="settings-panel" method="dialog">
      <div class="settings-header">
        <h2>設定</h2>
        <button id="closeSettingsButton" class="mini-button primary" type="button" aria-label="戻る">戻る</button>
      </div>

      <div class="settings-fields">
        <section class="settings-section">
          <label class="field">
            <span>表示モード</span>
            <select id="themeMode" class="field-select">
              <option value="light">ライトモード</option>
              <option value="dark">ダークモード</option>
            </select>
          </label>
        </section>

        <section class="settings-section">
          <div class="section-head">
            <h3>車両番号</h3>
          </div>
          <label class="field">
            <span>車両番号を登録</span>
            <div class="field-row">
              <input id="newVehicleNumber" type="text" autocomplete="off" placeholder="例: 品川 100 あ 1234">
              <button id="addVehicleBtn" class="mini-button primary" type="button">登録</button>
              <button id="saveVehicleBackupBtn" class="mini-button" type="button">保存</button>
              <button id="restoreVehicleBackupBtn" class="mini-button" type="button">復元</button>
              <button id="deleteVehicleBackupBtn" class="mini-button" type="button">削除</button>
            </div>
            <div id="vehicleBackupStatus" class="backup-status">バックアップ: 読み込み待ち</div>
          </label>
          <div class="field">
            <span>登録済み車両番号</span>
            <div id="vehicleList" class="value-list"></div>
          </div>
        </section>

        <section class="settings-section">
          <div class="section-head">
            <h3>乗務員</h3>
          </div>
          <label class="field">
            <span>乗務員を登録</span>
            <div class="field-row">
              <input id="newDriverName" type="text" autocomplete="off" placeholder="漢字 例: 山田 太郎">
              <input id="newDriverReading" type="text" autocomplete="off" placeholder="ひらがな 例: やまだ たろう">
              <button id="addDriverBtn" class="mini-button primary" type="button">登録</button>
              <button id="saveDriverBackupBtn" class="mini-button" type="button">保存</button>
              <button id="restoreDriverBackupBtn" class="mini-button" type="button">復元</button>
              <button id="deleteDriverBackupBtn" class="mini-button" type="button">削除</button>
            </div>
            <div id="driverBackupStatus" class="backup-status">バックアップ: 読み込み待ち</div>
          </label>
          <div class="field">
            <span>登録済み乗務員</span>
            <div id="driverList" class="value-list"></div>
          </div>
        </section>

        <section class="settings-section">
          <div class="section-head">
            <h3>車種</h3>
          </div>
          <label class="field">
            <span>車種を登録</span>
            <div class="field-row">
              <select id="newTruckType" class="field-select"></select>
              <button id="addTruckTypeBtn" class="mini-button primary" type="button">登録</button>
            </div>
          </label>
          <div class="field">
            <span>登録済み車種</span>
            <div id="truckTypeList" class="value-list"></div>
          </div>
        </section>
      </div>

      <div class="settings-footer">
        <button id="confirmSettingsButton" class="mini-button primary" type="button">決定</button>
      </div>

      <p id="settingsStatus" class="settings-status" aria-live="polite"></p>
    </form>
  </dialog>

  <script src="./shared-settings.js"></script>
  <script src="./getjityretenkenhyou/firebase/firebase-config.js?v=20260226-1"></script>
  <script src="./getjityretenkenhyou/firebase/firebase-cloud-sync.js?v=20260226-1"></script>
  <script src="./launcher.js"></script>
</body>
</html>
